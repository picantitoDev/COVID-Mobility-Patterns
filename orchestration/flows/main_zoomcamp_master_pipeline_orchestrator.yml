id: master_pipeline_orchestrator
namespace: zoomcamp
description: Central orchestration workflow for the Dunnhumby Retail pipeline. Executes ingestion, Spark processing, external table creation, and dbt transformations.

triggers:
  - id: daily_pipeline_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 5 * * *"
    disabled: false

tasks:
  - id: bootstrap_runtime_config
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp
    flowId: gcp_kv
    wait: true
    transmitFailed: true

  - id: ingest_raw_data
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp
    flowId: ingest_dunnhumby_retail
    wait: true
    transmitFailed: true
    retry:
      type: constant
      interval: PT2M
      maxAttempt: 3

  - id: process_silver_layer
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp
    flowId: spark_test
    wait: true
    transmitFailed: true
    retry:
      type: constant
      interval: PT5M
      maxAttempt: 2

  - id: create_bigquery_external_tables
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp
    flowId: silver_to_bq
    wait: true
    transmitFailed: true

  - id: build_dbt_models
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp
    flowId: dbt_bq
    wait: true
    transmitFailed: true
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 2

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - echo "Pipeline failed at the exec {{ execution.id }}."