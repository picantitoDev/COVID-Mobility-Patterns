id: check-gcp-env-vars
namespace: dev.test

tasks:
  - id: print-gcp-vars
    type: io.kestra.plugin.core.log.Log
    message: |
      PROJECT_ID={{ ENV.kestra_gcp_project_id }}
      LOCATION={{ ENV.kestra_gcp_location }}
      BUCKET_NAME={{ ENV.kestra_gcp_bucket_name }}
      DATASET_STAGING={{ ENV.kestra_gcp_dataset_staging }}
      DATASET_INTERMEDIATE={{ ENV.kestra_gcp_dataset_intermediate }}
      DATASET_MARTS={{ ENV.kestra_gcp_dataset_marts }}