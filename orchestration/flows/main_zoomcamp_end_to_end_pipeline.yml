id: end_to_end_pipeline
namespace: zoomcamp
description: Central orchestration workflow for the Dunnhumby Retail pipeline. Executes ingestion, Spark processing, external table creation, and dbt transformations.

triggers:
  - id: daily_pipeline_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 5 * * *"
    disabled: false

tasks:
  - id: bootstrap_configuration
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp
    flowId: init_gcp_kv
    wait: true
    transmitFailed: true

  - id: data_ingestion
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp
    flowId: data_sources_ingestion
    wait: true
    transmitFailed: true
    retry:
      type: constant
      interval: PT2M
      maxAttempt: 3

  - id: distributed_cleansing
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp
    flowId: distributed_data_cleansing
    wait: true
    transmitFailed: true
    retry:
      type: constant
      interval: PT5M
      maxAttempt: 2

  - id: schema_mapping
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp
    flowId: warehouse_schema_mapping
    wait: true
    transmitFailed: true

  - id: analytical_modeling
    type: io.kestra.plugin.core.flow.Subflow
    namespace: zoomcamp
    flowId: analytical_model_transformation
    wait: true
    transmitFailed: true
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 2

errors:
  - id: alert_on_failure
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - echo "Pipeline failed at the exec {{ execution.id }}."