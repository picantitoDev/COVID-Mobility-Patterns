id: dbt_bq
namespace: zoomcamp
description: Main workflow to clone the repository and build the data warehouse with dbt in BigQuery.

tasks:
  - id: execute_dbt_models
    type: io.kestra.plugin.scripts.shell.Commands

    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: ghcr.io/dbt-labs/dbt-bigquery:1.9.0

    inputFiles:
      "gcp-key.json": "{{ secret('GCP_SERVICE_ACCOUNT') }}"

    commands:
      - |
        set -euo pipefail
        echo "--- Cloning repository ---"
        rm -rf repo
        git clone https://github.com/picantitoDev/COVID-Mobility-Patterns.git repo

        cd repo/dbt/zoomcamp

        mkdir -p ~/.dbt

        cat <<EOF > ~/.dbt/profiles.yml
        zoomcamp:
          outputs:
            dev:
              type: bigquery
              method: service-account
              project: zoomcamp-486316
              dataset: staging
              threads: 4
              keyfile: "{{ workingDir }}/gcp-key.json"
              location: us-central1
              priority: interactive
          target: dev
        EOF

        echo "--- Installing dependencies ---"
        dbt deps

        echo "--- Testing BigQuery connection ---"
        dbt debug

        echo "--- Building data warehouse ---"
        dbt build
