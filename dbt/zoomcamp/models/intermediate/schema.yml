version: 2

models:
  - name: int_transactions_enriched
    description: "Line-level transactions enriched with product attributes and consolidated discount metrics."

    columns:
      - name: basket_id
        description: "Transaction or basket identifier."
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: total_discount_amount
        description: "Total discount amount calculated from retailer, manufacturer, and loyalty discounts."

  - name: int_promotions_enriched
    description: "Transactions enriched with promotional causal data from in-store displays and mailers."

    columns:
      - name: is_on_display
        description: "Boolean flag indicating whether the product was on display during the transaction week."

      - name: is_in_mailer
        description: "Boolean flag indicating whether the product appeared in a promotional mailer during the transaction week."

  - name: int_campaign_redemptions_joined
    description: "Coupon redemption events joined with campaign metadata and redemption timing validation."

    columns:
      - name: is_redeemed_in_window
        description: "Boolean flag indicating whether coupon redemption occurred within the campaign date range."

  - name: int_customer_behavior_aggregated
    description: "Household-level aggregated purchase behavior enriched with demographic attributes."

    columns:
      - name: household_id
        description: "Unique household identifier."
        tests:
          - unique
          - not_null

      - name: avg_basket_value
        description: "Average basket value calculated as total spend divided by number of baskets."

      - name: total_items_bought
        description: "Total quantity of items purchased by the household."

  - name: int_household_campaign_exposure
    description: "Household campaign exposure data enriched with demographic and campaign attributes."

    columns:
      - name: household_id
        tests:
          - not_null

      - name: campaign_id
        tests:
          - not_null

      - name: campaign_type
        description: "Assigned campaign type."

  - name: int_product_coupon_eligibility
    description: "Coupon eligibility mapping across products and campaigns."

    columns:
      - name: coupon_upc
        description: "Universal product code for the coupon."
        tests:
          - not_null

      - name: product_id
        description: "Product eligible for coupon redemption."
        tests:
          - not_null

      - name: department_name
        description: "Product department associated with the promotion."